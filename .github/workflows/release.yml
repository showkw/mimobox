name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish-crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/publish-crates.sh

  build-binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cli_features: wasm,kvm
            build_mcp: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cli_features: wasm
            build_mcp: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install target
        run: rustup target add ${{ matrix.target }}
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build CLI
        run: cargo build --release -p mimobox-cli --features ${{ matrix.cli_features }} --target ${{ matrix.target }}
      - name: Build MCP
        if: matrix.build_mcp
        run: cargo build --release -p mimobox-mcp --features vm --target ${{ matrix.target }}
      - name: Rename binaries
        run: |
          cd target/${{ matrix.target }}/release
          mv mimobox-cli mimobox-cli-${{ matrix.target }}
          if [ -f mimobox-mcp ]; then
            mv mimobox-mcp mimobox-mcp-${{ matrix.target }}
          fi
      - name: Generate checksums
        run: |
          cd target/${{ matrix.target }}/release
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum mimobox-cli-${{ matrix.target }} > mimobox-cli-${{ matrix.target }}.sha256
          else
            shasum -a 256 mimobox-cli-${{ matrix.target }} > mimobox-cli-${{ matrix.target }}.sha256
          fi
          if [ "${{ matrix.build_mcp }}" = "true" ]; then
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum mimobox-mcp-${{ matrix.target }} > mimobox-mcp-${{ matrix.target }}.sha256
            else
              shasum -a 256 mimobox-mcp-${{ matrix.target }} > mimobox-mcp-${{ matrix.target }}.sha256
            fi
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mimobox-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mimobox-cli-*
            target/${{ matrix.target }}/release/mimobox-mcp-*

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: mimobox-*/mimobox*
          generate_release_notes: true

  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            extra-args: ''
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            extra-args: '-i python3.10'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.13
        if: runner.os == 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release ${{ matrix.extra-args }}
          target: ${{ matrix.target }}
          manylinux: auto
          working-directory: crates/mimobox-python
      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/*.whl

  publish-pypi:
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing wheels-*/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
