name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Check Workspace
        run: cargo check --workspace

      - name: Install rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Cargo Format Check
        run: cargo fmt --check --all

      - name: Cargo Clippy Workspace
        run: cargo clippy --workspace --all-features

  test-linux-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Test mimobox-os
        run: sudo env "PATH=$PATH" "CARGO_HOME=$CARGO_HOME" "RUSTUP_HOME=$RUSTUP_HOME" "HOME=$HOME" cargo test --package mimobox-os

  test-linux-vm:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check KVM Availability
        id: kvm
        run: |
          if [ -e /dev/kvm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GitHub-hosted ubuntu-latest runners do not expose /dev/kvm."
            echo "Skipping microVM tests; run them on a local Linux host with KVM."
          fi

      - name: Cargo Test mimobox-vm
        if: steps.kvm.outputs.available == 'true'
        run: cargo test --package mimobox-vm --features kvm

      - name: Skip microVM Tests
        if: steps.kvm.outputs.available != 'true'
        run: echo "test-linux-vm skipped because /dev/kvm is unavailable on GitHub-hosted runners."

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # SDK 的完整 VM 集成测试依赖 VM assets 和 /dev/kvm，这里先覆盖编译与基础逻辑。
      - name: Compile mimobox-sdk vm Test Targets
        run: cargo test --package mimobox-sdk --features vm --no-run

      - name: Run mimobox-sdk vm Library Tests
        run: cargo test --package mimobox-sdk --features vm --lib

      - name: Build mimobox-sdk Examples
        run: cargo build --package mimobox-sdk --examples

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Doc Workspace
        run: cargo doc --workspace --no-deps

      - name: Cargo Doc Tests
        run: cargo test --workspace --doc --all-features

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Cargo Audit
        run: cargo audit

  test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Test mimobox-os
        run: cargo test --package mimobox-os

      - name: Cargo Test mimobox-wasm
        run: cargo test --package mimobox-wasm --features wasm

  test-linux-wasm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Test mimobox-wasm
        run: cargo test --package mimobox-wasm --features wasm

  test-mcp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Test mimobox-mcp
        run: cargo test -p mimobox-mcp

  check-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Python Headers
        run: sudo apt-get update && sudo apt-get install -y python3-dev

      - name: Cargo Check mimobox-python
        env:
          PYO3_PYTHON: python3
        run: cargo check -p mimobox-python

  build-wheel-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          working-directory: crates/mimobox-python

      - name: Install wheel
        run: pip install target/wheels/*.whl

      - name: Test import
        run: python -c 'import mimobox; print("mimobox wheel import OK")'

  bench-regression:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run OS benchmarks
        run: cargo bench -p mimobox-os --bench pool_bench -- --save-baseline ci
      - name: Run Wasm benchmarks
        run: cargo bench -p mimobox-wasm --features wasm --bench wasm_bench -- --save-baseline ci
