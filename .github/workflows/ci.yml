name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Check Workspace
        run: cargo check --workspace

      - name: Cargo Clippy Workspace
        run: cargo clippy --workspace

  test-linux-os:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Test mimobox-os
        run: sudo --preserve-env=PATH,CARGO_HOME,RUSTUP_HOME,HOME cargo test --package mimobox-os

  test-linux-vm:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check KVM Availability
        id: kvm
        run: |
          if [ -e /dev/kvm ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "GitHub-hosted ubuntu-latest runners do not expose /dev/kvm."
            echo "Skipping microVM tests; run them on a local Linux host with KVM."
          fi

      - name: Cargo Test mimobox-vm
        if: steps.kvm.outputs.available == 'true'
        run: cargo test --package mimobox-vm --features kvm

      - name: Skip microVM Tests
        if: steps.kvm.outputs.available != 'true'
        run: echo "test-linux-vm skipped because /dev/kvm is unavailable on GitHub-hosted runners."

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # SDK 的完整 VM 集成测试依赖 VM assets 和 /dev/kvm，这里先覆盖编译与基础逻辑。
      - name: Compile mimobox-sdk vm Test Targets
        run: cargo test --package mimobox-sdk --features vm --no-run

      - name: Run mimobox-sdk vm Library Tests
        run: cargo test --package mimobox-sdk --features vm --lib

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Cargo Doc Workspace
        run: cargo doc --workspace --no-deps
